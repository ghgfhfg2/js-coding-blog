<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="{{ '/problems/' | relative_url }}">문제</a>
        <a href="{{ '/#today-track' | relative_url }}">오늘의 코테</a>
        <a href="{{ '/#algorithm-track' | relative_url }}">알고리즘별 코테</a>
        <a href="{{ '/#js-basic-track' | relative_url }}">JS 메서드 학습</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>
</body>
</html>
